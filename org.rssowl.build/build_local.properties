# The location of this pluginbuilder project. It provides the base directory for the build scripts.
# @category localsettings
# @type Directory
buildHome=D:/Codex/RSSOwl_64bit/rssowl-x64-codex-kit-v4/workspace/RSSOwl/org.rssowl.build

# The directory where the build takes place. This directory WILL BE DELETED before every build.
# @category localsettings
# @type Directory
buildDirectory=D:/Codex/RSSOwl_64bit/rssowl-x64-codex-kit-v4/.build/pluginbuilder

# The eclipse build host. Must be an Eclipse SDK installation with JDT and PDE. And in the case of RCP builds the RCP Delta Pack must be included, too.
# @category localsettings
# @type Directory
eclipseDir=D:/Codex/RSSOwl_64bit/rssowl-x64-codex-kit-v4/toolchain/eclipse/eclipse/

# Local fallback archive used by the legacy pluginbuilder bootstrap when it still
# decides to unpack a non-server Eclipse SDK.
eclipse.local.tar.non.server=D:/Codex/RSSOwl_64bit/rssowl-x64-codex-kit-v4/.downloads/eclipse-SDK-3.4.2-win32-x86_64.zip

# Environment for both the Eclipse build and test host. Determines baseos.
# @category localsettings
os=win32

# Environment for both the Eclipse build and test host. Determines basews.
# @category localsettings
ws=win32

# Environment for both the Eclipse build and test host. Determines basearch.
# Default to x86_64 for the conservative Windows x64 port. Override locally if
# you intentionally need the legacy x86 path.
# @category localsettings
arch=x86_64

# Forward a modern external javac into the inner PDE build. The legacy Eclipse
# 3.4 JDT compiler does not reliably compile against a modern local JRE.
buildSystemProperty.build.compiler=extJavac
